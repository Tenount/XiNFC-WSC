name: CI Quality Check

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: read

env:
  IMAGE: ghcr.io/${{ github.repository }}/megalinter-xinfc:latest

jobs:
  lint:
    name: MegaLinter
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull custom MegaLinter image
        run: docker pull "$(echo "$IMAGE" | tr '[:upper:]' '[:lower:]')"

      - name: MegaLinter
        run: |
          docker run --rm \
            -e GITHUB_TOKEN=${{ secrets.GITHUB_TOKEN }} \
            -e VALIDATE_ALL_CODEBASE=true \
            -e SHOW_ELAPSED_TIME=true \
            -v ${{ github.workspace }}:/tmp/lint \
            -w /tmp/lint \
            "$(echo "$IMAGE" | tr '[:upper:]' '[:lower:]')"
