name: Test

on:
  push:
    branches:
      - '**'
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Build and test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq libcmocka-dev

      - name: Build and run unit tests
        run: make -C tests/unit test

      - name: Build and run smoke tests
        run: make -C tests/unit smoke
