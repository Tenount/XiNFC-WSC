name: Build MegaLinter Image

on:
  push:
    branches: [main]
    paths:
      - 'docker/Dockerfile.megalinter'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v4

      - name: Build and push
        run: |
          IMAGE=ghcr.io/$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')/megalinter-xinfc:latest
          docker buildx build \
            --cache-from type=gha \
            --cache-to type=gha,mode=max \
            --file docker/Dockerfile.megalinter \
            --tag "$IMAGE" \
            --push .
